apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns-lab-hcp
  namespace: external-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-lab-hcp
rules:
- apiGroups:
  - ""
  resources:
  - endpoints
  - nodes
  - pods
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-lab-hcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-lab-hcp
subjects:
- kind: ServiceAccount
  name: external-dns-lab-hcp
  namespace: external-dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-lab-hcp
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns-lab-hcp
  template:
    metadata:
      labels:
        app: external-dns-lab-hcp
    spec:
      serviceAccountName: external-dns-lab-hcp
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.18.0
        args:
        - --source=service
        - --provider=cloudflare
        - --domain-filter=lost-aurora.de
        - --regex-domain-filter=^(api\.hcp\.lost-aurora\.de|konnectivity\.apps\.hcp\.lost-aurora\.de)$
        - --namespace=clusters-lab-hcp-lab-hcp
        - --annotation-filter=external-dns.alpha.kubernetes.io/hostname in (api.hcp.lost-aurora.de,konnectivity.apps.hcp.lost-aurora.de)
        - --registry=noop
        - --policy=upsert-only
        - --log-level=info
        env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-token-secret
              key: api-token
